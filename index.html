<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Four Squares</title>

  <link rel="stylesheet" href="css/css.css" />
  <script src="Javascript/Blud.js" defer></script>
</head>
<body>
  <button class="start-button" type="button">Start</button>

  <main class="square-grid" aria-label="Four colored squares">
    <div class="square red" data-color="Red"></div>
    <div class="square yellow" data-color="Yellow"></div>
    <div class="square blue" data-color="Blue"></div>
    <div class="square green" data-color="Green"></div>
  </main>

  <p id="clicked-square">Click a square.</p>
</body>
</html>
